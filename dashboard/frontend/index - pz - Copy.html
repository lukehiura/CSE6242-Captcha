<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCA Scatter Dashboard</title>
<style>
/* -------------------- GLOBAL -------------------- */
html, body {
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  background: #000;
  color: #BFBFBF;
  height: 100%;
}

/* -------------------- DASHBOARD GRID -------------------- */
#dashboard {
  width: 90vw;
  max-width: 1600px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  grid-template-rows: repeat(9, 1fr);
  gap: 10px;
  min-height: 600px;
}

/* -------------------- WRAPPERS & HEADERS -------------------- */
#scatter-wrapper, #radar-wrapper, #trajectory-wrapper, #filter-wrapper, #selected-point-info-wrapper {
  display: grid;
  grid-template-rows: 50px 1fr;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
#scatter-wrapper h3, #radar-wrapper h3, #trajectory-wrapper h3, #filter-wrapper h3, #selected-point-info-wrapper h3 {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0;
  font-size: 1.2rem;
  color: #fff;
}

/* -------------------- SCATTER -------------------- */
#scatter-wrapper { grid-column: 1 / span 8; grid-row: 1 / span 8; padding: 10px; }
#scatter-plot { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; 
  display: block; }
#scatter-plot svg { width: 100%; height: 100%; display: block; }

/* -------------------- RADAR -------------------- */
#radar-wrapper { grid-column: 9 / span 4; grid-row: 1 / span 4; padding: 10px; }
#radar { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
#radar svg { width: 100%; height: 100%; display: block; }

/* -------------------- FILTERS -------------------- */
#filter-wrapper { grid-column: 13 / span 4; grid-row: 1 / span 4; padding: 10px; }
#filter-container { width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }

/* -------------------- TRAJECTORY -------------------- */
#trajectory-wrapper { grid-column: 9 / span 8; grid-row: 5 / span 4; padding: 10px; }
#trajectory-plot { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
#trajectory-plot svg { width: 100%; height: 100%; display: block; }
#trajectory-caption { font-size: 0.9rem; text-align: center; margin-top: 5px; color: #fff; }

/* -------------------- SELECTED POINT PANEL -------------------- */
#selected-point-info-wrapper { grid-column: 1 / span 7; grid-row: 9 / span 1; padding: 10px; }
#selected-point-info { width: 100%; height: 100%; }

/* -------------------- SHARED TOOLTIP STYLE -------------------- */
.tooltip-style {
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 6px;
  border-radius: 4px;
  font-size: 0.85rem;
  white-space: normal;
  max-width: 250px;
}

/* -------------------- LEGEND & FILTER TEXT -------------------- */
.filters-text {
  font-size: 10px;
  fill: #BFBFBF;
  font-weight: normal;
}

.filters-text.hovered {
  fill: #E6E6E6;
  font-weight: bold;
}

.filters-text.selected {
  fill: #FFFFFF;
  font-weight: bold;
}

.radar-legend-highlighted-line {
  font-size: 12px;
  paint-order: stroke;
  stroke: #BFBFBF;
  stroke-width: 6px;
  stroke-linejoin: round;
}


</style>
</head>
<body>
<div id="dashboard">
  <!-- PCA Scatter -->
  <div id="scatter-wrapper">
    <h3>PCA Scatter Plot (PC1 vs PC2)</h3>
    <div id="scatter-plot"></div>
  </div>

  <!-- Radar -->
  <div id="radar-wrapper">
    <h3>Behavior Profile Radar</h3>
    <div id="radar"></div>
  </div>

  <!-- Game Type Filters -->
  <div id="filter-wrapper">
    <h3>Game Type</h3>
    <div id="filter-container"></div>
  </div>

  <!-- Mouse Trajectory -->
  <div id="trajectory-wrapper">
    <h3>Mouse Trajectory</h3>
    <div id="trajectory-plot"></div>
    <div id="trajectory-caption"></div>
  </div>

  <!-- Selected 
  <div id="selected-point-info-wrapper">
    <div id="selected-point-info"></div>
  </div>

</div>

<div id="tooltip"></div>
  Point Information -->
<!-- Scripts -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="js/svg_icons.js"></script>
<script src="js/pca_scatter - pz.js"></script>

</body>
</html>
