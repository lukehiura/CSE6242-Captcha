<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCA Scatter Dashboard</title>
<style>
/* -------------------- GLOBAL -------------------- */
html, body {
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  background: #f9f9f9;
  color: #111;
  height: 100%;
}

/* -------------------- DASHBOARD GRID -------------------- */
#dashboard {
  width: 90vw;
  max-width: 1600px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  grid-template-rows: repeat(9, 1fr);
  gap: 10px;
  min-height: 600px;
}

/* -------------------- WRAPPERS & HEADERS -------------------- */
#scatter-wrapper, #radar-wrapper, #trajectory-wrapper, #filter-wrapper, #selected-point-info-wrapper {
  display: grid;
  grid-template-rows: 50px 1fr;
  border-radius: 8px;
  overflow: hidden;
}
#scatter-wrapper h3, #radar-wrapper h3, #trajectory-wrapper h3, #filter-wrapper h3, #selected-point-info-wrapper h3 {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0;
  font-size: 1.2rem;
}

/* -------------------- SCATTER -------------------- */
#scatter-wrapper { grid-column: 1 / span 9; grid-row: 1 / span 9; padding: 10px; }
#scatter-plot, #radar, #trajectory-plot { width: 100%; aspect-ratio: 1 / 1; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
#scatter-plot svg, #radar svg, #trajectory-plot svg { width: 100%; height: 100%; display: block; }

/* -------------------- RADAR -------------------- */
#radar-wrapper { grid-column: 10 / span 4; grid-row: 1 / span 4; padding: 10px; }

/* -------------------- TRAJECTORY -------------------- */
#trajectory-wrapper { grid-column: 10 / span 4; grid-row: 5 / span 4; padding: 10px; }

#trajectory-caption {
  font-size: 0.9rem;
  text-align: center;
  margin-top: 5px;
  color: #111;
}

/* -------------------- FILTERS -------------------- */
#filter-wrapper { grid-column: 14 / span 3; grid-row: 1 / span 4; padding: 10px; }
#filter-container { width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }

/* -------------------- SHARED TOOLTIP STYLE -------------------- */
.tooltip-style {
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 6px;
  border-radius: 4px;
  font-size: 0.85rem;
  white-space: normal;
  max-width: 250px;
}



/* -------------------- SELECTED POINT PANEL -------------------- */
#selected-point-info-wrapper { 
  grid-column: 14 / span 3; 
  grid-row: 6 / span 4; 
  padding: 10px;
  display: flex;
  flex-direction: column;
}

#selected-point-info .tooltip-style {
  display: block;
  width: 100%;
  border-radius: 6px;
  padding: 10px;
  //background: rgba(0,0,0,0.7);
  color: white;
  font-size: 0.85rem;
  white-space: normal;
  max-width: 250px;
  font-weight: normal;
  transition: opacity 2s;
}

#trajectory-plot text.trajectory-caption {
  font-size: 10px;
  fill: #000;
  font-weight: normal;
  text-anchor: middle;
  dominant-baseline: hanging;
}


#selected-point-info .tooltip-style {

  border-radius: 6px;
  padding: 10px;
  transition: opacity 0.2s;
}


/* -------------------- LEGEND & FILTER TEXT -------------------- */
.legend-text {
  font-size: 10px;
  fill: #000;                        
  font-weight: normal;
}

.filters-text {
  font-size: 12px;
  fill: #111;
  font-weight: normal;
}

.filters-text.hovered {
  fill: #555;
  font-weight: bold;
}

.filters-text.selected {
  fill: #000;
  font-weight: bold;
}


</style>
</head>
<body>
<div id="dashboard">
  <!-- PCA Scatter -->
  <div id="scatter-wrapper">
    <h3>PCA Scatter Plot (PC1 vs PC2)</h3>
    <div id="scatter-plot"></div>
  </div>

  <div id="trajectory-wrapper">
    <h3>Mouse Trajectory</h3>
    <div id="trajectory-plot"></div>
    <div id="trajectory-caption" style="text-align:center; font-size:0.9rem; margin-top:5px;"></div>
  </div>

  <!-- Radar -->
  <div id="radar-wrapper">
    <h3>Behavior Profile Radar</h3>
    <div id="radar"></div>
  </div>

  <!-- Game Type Filters -->
  <div id="filter-wrapper">
    <h3>Game Type</h3>
    <div id="filter-container"></div>
  </div>


  <!-- Selected Point Information -->
  <div id="selected-point-info-wrapper">
    <div id="selected-point-info"></div>
  </div>
</div>
<div id="tooltip"></div>

<!-- Scripts -->
<script src="https://d3js.org/d3.v7.min.js"></script>


<script src="js/svg_icons.js"></script>
<script src="js/pca_scatter - pz.js"></script>


</body>
</html>
