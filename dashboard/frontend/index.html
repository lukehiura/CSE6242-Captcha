<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCA Scatter Dashboard</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      background: #f9f9f9;
      color: #111;
    }

    #dashboard {
      width: 90vw;
      max-width: 1600px;
      display: flex;
      gap: 30px;
      padding: 20px;
    }

    /* LEFT: Scatter */
    #scatter-wrapper {
      flex: 2;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    #scatter-wrapper h3 {
      flex: 0 0 40px;
      margin: 0;
      padding: 10px;
      text-align: center;
      font-size: 1rem;
    }

    #scatter-plot {
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    /* RIGHT: Legend + Radar */
    #right-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #clusters-wrapper {
      flex: 0 0 120px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      padding: 10px;
      overflow-y: auto;
    }

    #clusters-wrapper h3 {
      margin: 0 0 5px 0;
      font-size: 0.9rem;
      text-align: center;
    }

    #legend {
      flex: 1;
      font-size: 0.8rem;
    }

    #radar-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      padding: 10px;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #radar-wrapper h3 {
      margin: 0 0 5px 0;
      font-size: 0.9rem;
      text-align: center;
    }

    #radar-wrapper .info {
      font-size: 0.7rem;
      text-align: center;
      margin-bottom: 4px;
    }

    #radar {
      width: 350px;
      height: 350px;
    }

    #tooltip {
      position: absolute;
      padding: 6px;
      background: rgba(0,0,0,0.7);
      color: white;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      font-size: 0.85rem;
    }

  </style>
</head>
<body>

  <div id="dashboard">

    <!-- LEFT: PCA Scatter -->
    <div id="scatter-wrapper">
      <h3>PCA Scatter Plot (PC1 vs PC2)</h3>
      <div id="scatter-plot"></div>
    </div>

    <!-- RIGHT: Legend + Radar -->
    <div id="right-column">

      <!-- CLUSTERS -->
      <div id="clusters-wrapper">
        <h3>PCA Clusters</h3>
        <div id="legend"></div>
      </div>

      <!-- RADAR -->
      <div id="radar-wrapper">
        <h3>Behavior Profile Radar</h3>
        <div class="info">
          <span style="color:#000;">Black outline:</span> cluster centroid averages,
          <span style="opacity:0.4;">filled polygon:</span> selected point behavior
        </div>
        <div id="radar"></div>
      </div>

    </div>

  </div>

  <div id="tooltip"></div>

  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="js/pca_scatter.js"></script>

</body>
</html>
