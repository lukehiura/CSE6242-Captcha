<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCA Scatter Dashboard</title>
<style>
/* -------------------- GLOBAL -------------------- */
html, body {
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  background: #f9f9f9;
  color: #111;
  height: 100%;
}

/* -------------------- DASHBOARD GRID -------------------- */
#dashboard {
  width: 90vw;
  max-width: 1600px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  grid-template-rows: repeat(9, 1fr);
  gap: 10px;
  min-height: 600px;
}

/* -------------------- WRAPPERS & HEADERS -------------------- */
#scatter-wrapper, #radar-wrapper, #trajectory-wrapper, #filter-wrapper {
  display: grid;
  grid-template-rows: 50px 1fr;
  border-radius: 8px;
  overflow: hidden;
}
#scatter-wrapper h3, #radar-wrapper h3, #trajectory-wrapper h3, #filter-wrapper h3 {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0;
  font-size: 1.2rem;
}

/* -------------------- SCATTER -------------------- */
#scatter-wrapper { grid-column: 1 / span 9; grid-row: 1 / span 9; padding: 10px; }
#scatter-plot, #radar, #trajectory-plot { width: 100%; aspect-ratio: 1 / 1; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
#scatter-plot svg, #radar svg, #trajectory-plot svg { width: 100%; height: 100%; display: block; }

/* -------------------- RADAR -------------------- */
#radar-wrapper { grid-column: 9 / span 4; grid-row: 1 / span 4; padding: 10px; }

/* -------------------- TRAJECTORY -------------------- */
#trajectory-wrapper { grid-column: 9 / span 4; grid-row: 5 / span 4; padding: 10px; }

/* -------------------- FILTERS -------------------- */
#filter-wrapper { grid-column: 13 / span 4; grid-row: 1 / span 3; padding: 10px; }
#filter-container { width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }

/* -------------------- TOOLTIP -------------------- */
#tooltip {
  position: absolute;
  pointer-events: none;
  opacity: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 6px;
  border-radius: 4px;
  font-size: 0.85rem;
  transition: opacity 0.15s;
  left: 0;
  top: 0;
  display: block;
  white-space: normal;
  max-width: 250px;
}

/* -------------------- LEGEND TEXT -------------------- */
.legend-text {
  font-size: 12px;
  fill: #000;                        
  font-weight: normal;
}
</style>
</head>
<body>
<div id="dashboard">
  <!-- PCA Scatter -->
  <div id="scatter-wrapper">
    <h3>PCA Scatter Plot (PC1 vs PC2)</h3>
    <div id="scatter-plot"></div>
  </div>

  <!-- Mouse Trajectory -->
  <div id="trajectory-wrapper">
    <h3>Mouse Trajectory</h3>
    <div id="trajectory-plot"></div>
  </div>

  <!-- Radar -->
  <div id="radar-wrapper">
    <h3>Behavior Profile Radar</h3>
    <div id="radar"></div>
  </div>

  <!-- Game Type Filters -->
  <div id="filter-wrapper">
    <h3>Game Type</h3>
    <div id="filter-container"></div>
  </div>
</div>

<div id="tooltip"></div>

<!-- Scripts -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="js/svg_icons.js"></script>
<script src="js/pca_scatter.js"></script>
<script src="js/mouse_trajectory.js"></script>
</body>
</html>
