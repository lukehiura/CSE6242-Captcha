<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCA Scatter Dashboard</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      background: #f9f9f9;
      color: #111;
    }

    #dashboard {
      width: 90vw;
      max-width: 1600px;
      margin: auto;
      display: flex;
      gap: 30px;
      padding: 20px 0;
    }

    /* LEFT: Scatter */
    #scatter-wrapper {
      flex: 2;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    #scatter-wrapper h3 {
      margin: 0;
      padding: 10px;
      text-align: center;
      font-size: 1rem;
      flex: 0 0 40px;
    }

    #selection-context {
      text-align: center;
      font-size: 0.82rem;
      padding: 0 12px 8px;
      line-height: 1.35;
      color: #333;
      border-bottom: 1px solid #eee;
    }

    #selection-context .game-pill {
      display: inline-block;
      font-weight: 700;
      font-size: 0.88rem;
      color: #111;
      background: #e8f4fc;
      border: 1px solid #b8d4ea;
      border-radius: 999px;
      padding: 2px 10px;
      margin: 0 4px;
    }

    #selection-context.muted {
      color: #888;
      font-style: italic;
    }

    #scatter-plot {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      min-height: 0;
      position: relative;
    }

    #scatter-plot svg {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    /* RIGHT: Legend + Radar */
    #right-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #clusters-wrapper {
      flex: 0 0 150px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      padding: 10px;
      overflow-y: auto;
      align-items: center;
    }

    #clusters-wrapper h3 {
      margin: 0 0 5px 0;
      font-size: 0.9rem;
      text-align: center;
    }

    #legend {
      flex: 1;
      width: 100%;
      font-size: 0.8rem;
    }

    .legend-row {
      display: flex;
      align-items: center;
      cursor: pointer;
      margin-bottom: 4px;
      width: 100%;
      justify-content: flex-start;
    }

    .legend-row span.color-box {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 6px;
    }

    .legend-row span.label {
      flex: 1;
    }

    #radar-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      padding: 10px;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #radar-wrapper h3 {
      margin: 0 0 5px 0;
      font-size: 0.9rem;
      text-align: center;
    }

    #radar-wrapper .info {
      font-size: 0.7rem;
      text-align: center;
      margin-bottom: 4px;
    }

    #radar {
      width: 100%;
      max-width: 350px;
      height: 350px;
    }

    #trajectory-wrapper {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      padding: 10px;
      align-items: center;
    }

    #trajectory-wrapper h3 {
      margin: 0 0 5px 0;
      font-size: 0.9rem;
      text-align: center;
    }

    #trajectory-wrapper .info {
      font-size: 0.7rem;
      text-align: center;
      margin-bottom: 6px;
      color: #444;
    }

    #trajectory {
      width: 100%;
      max-width: 350px;
      min-height: 280px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #trajectory svg {
      display: block;
    }

    #tooltip {
      position: absolute;
      padding: 6px;
      background: rgba(0,0,0,0.7);
      color: white;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      font-size: 0.85rem;
      z-index: 10;
    }

  </style>
</head>
<body>

  <div id="dashboard">

    <!-- LEFT: PCA Scatter -->
    <div id="scatter-wrapper">
      <h3>PCA Scatter Plot (PC1 vs PC2)</h3>
      <div id="selection-context" class="muted">Click a point to see game type and trajectory.</div>
      <div id="scatter-plot"></div>
    </div>

    <!-- RIGHT: Legend + Radar -->
    <div id="right-column">

      <!-- CLUSTERS -->
      <div id="clusters-wrapper">
        <h3>PCA Clusters</h3>
        <div id="legend"></div>
      </div>

      <!-- RADAR -->
      <div id="radar-wrapper">
        <h3>Behavior Profile Radar</h3>
        <div class="info">
          <span style="color:#000;">Black outline:</span> cluster centroid averages,
          <span style="opacity:0.4;">filled polygon:</span> selected point behavior
        </div>
        <div id="radar"></div>
      </div>

      <!-- path viz, needs backend running -->
      <div id="trajectory-wrapper">
        <h3>Mouse trajectory</h3>
        <div class="info" id="trajectory-caption">click a dot to load path</div>
        <div id="trajectory"></div>
      </div>

    </div>

  </div>

  <div id="tooltip"></div>

  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="js/pca_scatter.js"></script>

</body>
</html>
