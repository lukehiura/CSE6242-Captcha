<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCA Scatter Dashboard</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      background: #f9f9f9;
      color: #111;
    }

    h2 {
      text-align: center;
    }

    /* Container for scatter plot */
    #scatter-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 20px auto;
      width: 90%;
      max-width: 600px;
    }

    /* Actual scatter div / SVG placeholder */
    #scatter {
      width: 100%;
      height: 600px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      position: relative;
    }
  </style>
</head>
<body>
  <div id="scatter-container">
    <h2>PCA Scatter Plot (PC1 vs PC2)</h2>
    <div id="scatter"></div>
  </div>

  <!-- Load D3.js / PCA Scatter -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="js/pca_scatter.js"></script>
</body>
</html>
